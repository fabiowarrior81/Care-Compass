const HELP = {
  mmse: { title: "MMSE \u2014 Mini-Mental State Examination", purpose: "Screening cognitivo globale. Valuta orientamento, memoria, attenzione, calcolo, linguaggio e prassia costruttiva. Validato e ampiamente diffuso. Meno sensibile dell'MMSE per il deterioramento lieve (MCI) \u2014 in quei casi preferire MoCA.", time: "8\u201312 minuti", developed: "Folstein et al., 1975", scoring: "27\u201330: Normale\n21\u201326: Deterioramento lieve\n11\u201320: Deterioramento moderato\n0\u201310: Deterioramento grave", admin: ["Ambiente silenzioso, paziente seduto e collaborante", "Leggere ogni item con tono neutro, senza suggerire la risposta", "Orientamento temporale: giorno, mese, anno, stagione, giorno della settimana", "Orientamento spaziale: Stato, regione, citt\xE0, struttura, piano/reparto", "Registrazione: dire 3 parole lentamente (MELA \u2013 TAVOLO \u2013 PENNY) e chiedere di ripeterle subito", "Attenzione: 100 \u2013 7 per 5 sottrazioni OPPURE compitare MONDO al contrario", "Richiamo: richiedere le 3 parole dette in precedenza", "Linguaggio: mostrare orologio e matita ('Come si chiama questo?')", "Ripetizione: far ripetere 'Non c'\xE8 se, ma o per\xF2'", "Comprensione: 'Prenda il foglio con la mano destra, lo pieghi a met\xE0, lo metta sul pavimento'", "Lettura: mostrare scritto 'CHIUDA GLI OCCHI'", "Scrittura: 'Scriva una frase di senso compiuto'", "Copia: 'Copi esattamente questo disegno' (pentagoni sovrapposti)"], correction: "Correggere per scolarit\xE0: -1 punto per ogni anno di istruzione sotto i 5 anni (max -3 punti).", notes: "Un punteggio borderline (24\u201326) in paziente con alta scolarit\xE0 \xE8 pi\xF9 significativo. Considerare sempre il declino rispetto al baseline stimato.", printItems: [{ cat: "Orientamento temporale (5 pt)", items: ["Giorno della settimana", "Giorno del mese", "Mese", "Anno", "Stagione"] }, { cat: "Orientamento spaziale (5 pt)", items: ["Nazione", "Regione", "Citt\xE0", "Struttura / Ospedale", "Piano / Reparto"] }, { cat: "Registra   moca: { title: "MoCA \u2014 Montreal Cognitive Assessment", purpose: "Screening cognitivo sensibile per MCI e demenza lieve. Valuta: visuospaziale/esecutivo, denominazione, attenzione, linguaggio, astrazione, memoria differita e orientamento. Preferire all'MMSE quando si sospetta MCI o demenza lieve.", time: "10\u201315 minuti", developed: "Nasreddine et al., 2005", scoring: "26\u201330: Normale (aggiungere +1 se scolarit\xE0 \u226412 anni)\n18\u201325: Impairment lieve\n10\u201317: Impairment moderato\n0\u20139: Impairment grave", admin: ["TMT B: 'Colleghi i cerchi alternando numeri e lettere: 1 poi A poi 2 poi B...' \u2014 senza staccare la matita", "Copia cubo 3D: mostrare il modello e chiedere di copiarlo", "Orologio: 'Disegni un orologio, inserisca tutti i numeri e le lancette alle 11 e 10'", "Denominazione: mostrare 3 animali (leone, rinoceronte, cammello)", "Span diretto: leggere '2 \u2013 1 \u2013 8 \u2013 5 \u2013 4' a 1 cifra/secondo", "Span inverso: leggere '7 \u2013 4 \u2013 2', paziente ripete al contrario", "Vigilanza A: leggere lista di lettere lentamente, il paziente batte il pugno ad ogni A", "Calcolo: 100 \u2013 7 per 5 sottrazioni consecutive", "Ripetizione frase 1: 'So che John \xE8 quello che aiuta oggi'", "Ripetizione frase 2: 'Il gatto si nascondeva sempre sotto il divano quando i cani erano presenti'", "Fluenza F: quante parole che iniziano per F riesce a dire in 60 secondi? (\u226511 = corretto)", "Astrazione: 'In che senso si somigliano treno e bicicletta?' e 'Orologio e righello?'", "Richiamo: richiedere le 5 parole memorizzate all'inizio senza aiuto, poi con categoria, poi con opzione multipla", "Orientamento: data, mese, anno, giorno, luogo, citt\xE0"], correction: "+1 punto se scolarit\xE0 \u2264 12 anni.", notes: "Il MoCA \xE8 pi\xF9 sensibile dell'MMSE per deficit esecutivi e amnesia da recupero (MCI amnestico). Disponibile in versione validata italiana.", printItems: [{ cat: "Visuospaziale / Esecutivo (5 pt)", items: ["TMT B (1 pt)", "Copia cubo (1 pt)", "Orologio \u2014 contorno corretto (1 pt)", "Orologio \u2014 numeri corretti (1 pt)", "Orologio \u2014 lancette corrette (1 pt)"] }, { cat: "Denominazione (3 pt)", items: ["Leone (1 pt)", "Rinoceronte (1 pt)", "Cammello (1 pt)"] }, { cat: "Attenzione (6 pt)", items: ["Span diretto 2-1-8-5-4 (1 pt)", "Span inverso 7-4-2 (1 pt)", "Vigilanza lettera A (1 pt)", "93 (1 pt)", "86 (1 pt)", "79 (1 pt)"] }, { cat: "Linguaggio (3 pt)", items: ["Ripete frase 1 (1 pt)", "Ripete frase 2 (1 pt)", "Fluenza \u226511 parole con F (1 pt)"] }, { cat: "Astrazione (2 pt)", items: ["Treno / bicicletta (1 pt)", "Orologio / righello (1 pt)"] }, { cat: "Memoria differita (5 pt)", items: ["VISO (1 pt)", "VELLUTO (1 pt)", "CHIESA (1 pt)", "MARGHERITA (1 pt)", "ROSSO (1 pt)"] }, { cat: "Orientamento (6 pt)", items: ["Data (1 pt)", "Mese (1 pt)", "Anno (1 pt)", "Giorno (1 pt)", "Luogo (1 pt)", "Citt\xE0 (1 pt)"] }], hasSvg: true, svgItems: ["tmt", "cube", "clock"], words5: ["VISO", "VELLUTO", "CHIESA", "MARGHERITA", "ROSSO"] },
  clock: { title: "Clock Drawing Test (CDT)", purpose: "Screening rapido di visuospazialit\xE0 e funzioni esecutive. Identifica deficit nelle demenze, nelle sindromi frontali e nel neglect spaziale. Rapido, accettabile dal paziente, non richiede materiali particolari.", time: "2\u20134 minuti", developed: "Goodglass & Kaplan, 1983", scoring: "Punteggio GeriScope (max 3):\n1 pt \u2014 Contorno: cerchio approssimativamente chiuso\n1 pt \u2014 Numeri: tutti e 12 presenti, posizione approssimata\n1 pt \u2014 Lancette: indicano le 11:10 in modo riconoscibile", admin: ["Consegnare un foglio bianco (o con il cerchio pre-stampato se il paziente ha difficolt\xE0 di planning)", "Istruzione: 'Disegni un orologio con tutti i numeri e metta le lancette alle 11 e 10'", "Non aiutare, non suggerire correzioni durante l'esecuzione", "Non limitare il tempo (di solito < 3 minuti)", "Osservare il processo: inizia dal centro? Distribuisce bene i numeri? Posiziona correttamente le lancette?"], notes: "Errori tipici nelle demenze: numeri fuori dal cerchio o in senso antiorario, lancette che indicano 10:11 invece di 11:10 ('pull to stimulus'), numeri ripetuti o mancanti.", hasSvg: true, svgItems: ["clock"] },
  gds: { title: "GDS-15 \u2014 Geriatric Depression Scale", purpose: "Screening per la depressione nell'anziano. La versione breve (15 item) evita i sintomi somatici per ridurre i falsi positivi in presenza di comorbilit\xE0 mediche. Validata e ampiamente usata in geriatria.", time: "5\u20137 minuti", developed: "Sheikh & Yesavage, 1986", scoring: "0\u20134: Normale\n5\u20138: Depressione lieve\n9\u201311: Depressione moderata\n12\u201315: Depressione grave", admin: ["Fare le domande lentamente, in modo non giudicante", "Riferirsi a come il paziente si \xE8 sentito nell'ULTIMA SETTIMANA", "Se il paziente ha difficolt\xE0 uditive: mostrare le opzioni S\xCC/NO scritte", "Se MMSE < 15: la GDS perde affidabilit\xE0 \u2014 considerare Cornell Scale for Depression in Dementia", "Rispondere YES/NO, non scale intermedie"], notes: "Item a punteggio diretto (S\xCC=1): 2,3,4,6,8,9,10,12,14,15\nItem inversi (NO=1): 1,5,7,11,13" },
  cam: { title: "CAM \u2014 Confusion Assessment Method", purpose: "Diagnosi di delirium al letto del paziente. Algoritmo a 4 caratteristiche, utilizzabile da personale non psichiatrico. Sensibilit\xE0 94%, specificit\xE0 89%.", time: "5 minuti", developed: "Inouye et al., 1990", scoring: "POSITIVO = Feature 1 E Feature 2 E (Feature 3 O Feature 4)\n\nNEGATIVO = mancano uno o pi\xF9 criteri richiesti", admin: ["Feature 1 \u2014 ESORDIO ACUTO E DECORSO FLUTTUANTE: cambiamento rispetto al baseline? Fluctua durante la giornata? (informare con infermieri e familiari)", "Feature 2 \u2014 DISATTENZIONE: difficolt\xE0 a mantenere l'attenzione? Si distrae facilmente? Risponde a domande non fatte?", "Feature 3 \u2014 PENSIERO DISORGANIZZATO: discorso incoerente? Idee non connesse? Cambia argomento imprevedibilmente?", "Feature 4 \u2014 ALTERAZIONE DEL LIVELLO DI COSCIENZA: iperallerta, letargico, soporoso o comatoso? (qualsiasi risposta diversa da 'normale/allerta' = positivo)"], notes: "Il delirium \xE8 un'emergenza medica. Cercare SEMPRE la causa sottostante: infezione, farmaci, dolore non trattato, ritenzione urinaria, fecaloma, ipoglicemia, iponatriemia." },
  barthel: { title: "Indice di Barthel", purpose: "Misura dell'indipendenza nelle 10 attivit\xE0 di base della vita quotidiana. La scala funzionale pi\xF9 usata in riabilitazione e geriatria. Predice mortalit\xE0, istituzionalizzazione e risposta alla riabilitazione.", time: "5\u201310 minuti", developed: "Mahoney & Barthel, 1965", scoring: "100: Indipendente\n75\u201399: Dipendenza lieve\n50\u201374: Dipendenza moderata\n25\u201349: Dipendenza grave\n0\u201324: Dipendenza totale\n\nScore < 60 = di solito non adatto alla dimissione senza supporto\nScore > 85 = buon predittore di dimissione domiciliare", admin: ["Valutare ci\xF2 che il paziente FA effettivamente nelle ultime 48\u201372h, non ci\xF2 che potrebbe fare", "Basarsi sull'osservazione e sulle informazioni di infermieri e familiari", "L'uso di ausili (bastone, carrozzina) \xE8 compatibile con i punteggi pi\xF9 alti", "I punteggi intermedi (5, 10) indicano necessit\xE0 di assistenza parziale"], notes: "Ogni aumento di 5 punti nel Barthel durante la riabilitazione correla con miglioramento clinicamente significativo." },
  adl: { title: "ADL \u2014 Katz Index of Independence", purpose: "Valutazione dell'indipendenza nelle 6 attivit\xE0 di base. Scala ordinale semplice e rapida, utile per monitorare la traiettoria funzionale e pianificare la dimissione.", time: "3\u20135 minuti", developed: "Katz et al., 1963", scoring: "6: Indipendente in tutto\n4\u20135: Dipendenza lieve\n2\u20133: Dipendenza moderata\n0\u20131: Dipendenza severa", admin: ["BAGNO: indipendente se lava tutto il corpo da solo (pu\xF2 ricevere aiuto per una sola parte)", "VESTIRSI: indipendente se prende e indossa i vestiti da solo (escluse le scarpe)", "TOILETTE: indipendente se va al bagno, si pulisce e si sistema senza aiuto", "TRASFERIMENTO: indipendente se entra/esce dal letto e dalla sedia senza aiuto", "CONTINENZA: controllo completo di intestino e vescica", "ALIMENTAZIONE: si porta il cibo alla bocca da solo (il taglio pu\xF2 essere assistito)"] },
  iadl: { title: "IADL \u2014 Lawton & Brody Scale", purpose: "Valuta le attivit\xE0 strumentali, cognitivamente pi\xF9 complesse delle ADL. Sensibile ai deficit iniziali. Fondamentale per valutare la capacit\xE0 di vita autonoma e i bisogni di supporto domiciliare.", time: "5 minuti", developed: "Lawton & Brody, 1969", scoring: "Punteggio pi\xF9 alto = maggiore indipendenza.\nRiduzione rispetto al baseline premorboso = segnale clinicamente rilevante anche se il valore assoluto appare normale.", admin: ["Esplorare sempre il BASELINE PREMORBOSO (come era prima dell'evento acuto)", "Telefono, fare acquisti, cucinare, cura della casa, lavanderia, trasporti, farmaci, denaro", "Per pazienti istituzionalizzati: alcune voci potrebbero non essere applicabili", "Informarsi con i familiari per una valutazione pi\xF9 accurata"] },
  sppb: { title: "SPPB \u2014 Short Physical Performance Battery", purpose: "Valuta la funzione degli arti inferiori con 3 test oggettivi: equilibrio, velocit\xE0 del cammino e alzarsi dalla sedia. Predice disabilit\xE0, istituzionalizzazione e mortalit\xE0. Ottimo outcome per la riabilitazione.", time: "8\u201312 minuti", developed: "Guralnik et al., 1994", scoring: "12: Normale\n9\u201311: Limitazione lieve\n4\u20138: Limitazione moderata\n0\u20133: Limitazione severa\n\nOgni calo di 1 punto = aumento significativo del rischio di disabilit\xE0", admin: ["TEST EQUILIBRIO \u2014 3 stazioni successive:\n  a. Piedi affiancati: mantenere 10s \u2192 se fallisce: 0pt per equilibrio\n  b. Semi-tandem: tallone a lato dell'alluce opposto, 10s\n  c. Tandem: tallone contro punta, 10s\n  Scoring: 0=incapace, 1=tandem<3s, 2=tandem 3\u20139.9s, 3=semi-tandem OK+tandem<3s, 4=tandem\u226510s", "TEST VELOCITA' CAMMINO \u2014 4 metri a passo normale, misurare il tempo:\n  0=incapace, 1=\u22658.70s, 2=6.21\u20138.70s, 3=4.82\u20136.20s, 4=<4.82s", "TEST ALZARSI \u2014 5 ripetizioni con braccia incrociate, pi\xF9 veloce possibile:\n  0=incapace, 1=>60s, 2=16.70\u201360s, 3=13.70\u201316.69s, 4=\u226413.69s"], notes: "SPPB \u2264 9 = fragile performance fisica. Indicazione alla fisioterapia e programma di esercizio." },
  tug: { title: "Timed Up & Go (TUG)", purpose: "Misura della mobilit\xE0 funzionale e del rischio di caduta. Rapido, oggettivo, ben validato. Indica la capacit\xE0 di trasferimento e di deambulazione.", time: "2\u20133 minuti", developed: "Podsiadlo & Richardson, 1991", scoring: "< 10s: Normale \u2014 basso rischio cadute\n10\u201320s: Rischio lieve-moderato \u2014 valutare fisioterapia\n> 20s: Rischio elevato \u2014 intervento urgente, fisioterapia\n> 30s: Alta dipendenza \u2014 assistenza necessaria per la maggior parte delle IADL", admin: ["Sedia con braccioli, altezza seduta circa 46 cm, il paziente usa i propri ausili abituali", "Il paziente parte seduto con la schiena appoggiata allo schienale", "Al segnale 'VIA': si alza, cammina fino al segnale a 3 metri, gira, torna, si risiede", "Il cronometro parte al 'VIA' e si ferma quando il paziente ha completamente ripreso posizione seduta", "Prima una prova di familiarizzazione (non cronometrata)", "Annotare: tipo di ausili usati, eventuali esitazioni o instabilit\xE0"] },
  tinetti: { title: "Tinetti \u2014 POMA (Performance Oriented Mobility Assessment)", purpose: "Valuta equilibrio statico/dinamico e andatura. Predice il rischio di caduta. Utile in riabilitazione e per monitorare i progressi.", time: "8\u201312 minuti", developed: "Tinetti, 1986", scoring: "\u226525: Basso rischio di caduta\n19\u201324: Rischio moderato\n<19: Rischio elevato \u2014 intervento urgente fisioterapico", admin: ["EQUILIBRIO (max 16 pt) \u2014 paziente seduto su sedia senza braccioli:\n  Valutare: stabilit\xE0 seduta, alzarsi, tentativi per alzarsi, equilibrio stazionario (immediato, prolungato), risposta alla spinta, occhi chiusi, girarsi 360\xB0, sedersi", "ANDATURA (max 12 pt) \u2014 osservare mentre il paziente cammina:\n  Valutare: inizio del cammino, simmetria e altezza del passo, continuit\xE0, traiettoria, tronco, distanza dei piedi"], notes: "Tinetti < 19 = rischio elevato di caduta. Attivare: fisioterapia, valutazione dell'ambiente domestico, revisione farmacologica (benzodiazepine, antiipertensivi), supplementazione vitamina D." },
  cirs: { title: "CIRS \u2014 Cumulative Illness Rating Scale", purpose: "Quantifica il carico di comorbilit\xE0 per 14 sistemi d'organo. Fornisce il Severity Index e il Comorbidity Index. Predice mortalit\xE0 e outcome ospedaliero.", time: "8\u201315 minuti", developed: "Linn et al., 1968; versione geriatrica Miller 1992", scoring: "Per ogni sistema, 0\u20134:\n0: Nessun problema\n1: Lieve (non interferisce con l'attivit\xE0 normale)\n2: Moderato (richiede terapia o causa disabilit\xE0 parziale)\n3: Grave (causa disabilit\xE0 significativa, terapia intensiva)\n4: Gravissimo/terminale\n\nSeverity Index (media) > 1.5 = carico significativo\nComorbidity Index (n. sistemi \u22653) \u2265 2 = alta complessit\xE0" },
  charlson: { title: "Charlson Comorbidity Index (CCI)", purpose: "Predice la mortalit\xE0 a 1 e 10 anni in base alle comorbilit\xE0 ponderate. Guida le decisioni terapeutiche e la stratificazione del rischio operatorio e oncologico.", time: "5 minuti", developed: "Charlson et al., 1987", scoring: "0 pt: mortalit\xE0 stimata 10 anni ~12%\n1\u20132 pt: ~26%\n3\u20134 pt: ~52%\n\u22655 pt: ~85%\n(Versione et\xE0-aggiustata: +1 pt per ogni decade dopo i 50 anni)" },
  beers: { title: "Criteri di Beers \u2014 Revisione Farmacologica", purpose: "Identificano farmaci potenzialmente inappropriati nell'anziano (AGS Beers Criteria 2023). La revisione sistematica riduce eventi avversi, cadute, ricoveri e mortalit\xE0.", time: "5\u201310 minuti", developed: "Beers 1991; AGS aggiornamento 2023", scoring: "Non \xE8 un punteggio numerico. Ogni farmaco segnalato richiede valutazione: beneficio > rischio? Esiste alternativa pi\xF9 sicura?", admin: ["Raccogliere lista completa dei farmaci inclusi OTC, erbe officinali e integratori", "Identificare farmaci ad alto rischio: anticolinergici, benzodiazepine, antipsicotici, FANS, sulfaniluree a lunga azione", "Valutare la dose in funzione della clearance renale (attenzione a metformina, digossina, FANS, oppioidi)", "Polypharmacy = 5+ farmaci. Hyperpolypharmacy = 10+. Il rischio di interazioni cresce esponenzialmente"], notes: "Strumenti complementari europei: STOPP/START criteria (pi\xF9 applicabili alla pratica italiana e europea)." },
  pain: { title: "Valutazione del Dolore \u2014 NRS e PAINAD", purpose: "NRS per pazienti collaboranti (autovalutazione). PAINAD per pazienti non verbali o con MMSE \u226415 (valutazione comportamentale osservazionale). Il dolore nell'anziano \xE8 spesso sottotrattato.", time: "2\u20135 minuti", scoring: "NRS: 0=nessun dolore \xB7 1-3=lieve \xB7 4-6=moderato \xB7 7-10=severo\nPAINAD: 0-2=nessuno/lieve \xB7 3-7=moderato \xB7 8-10=severo", admin: ["NRS \u2014 chiedere: 'Su una scala da 0 a 10, dove 0 = nessun dolore e 10 = il peggior dolore che si possa immaginare, come valuta il suo dolore in questo momento?'", "PAINAD \u2014 osservare per 5 minuti a riposo e durante la mobilizzazione:\n  Respirazione (0=normale, 1=affannosa occasionale, 2=affannosa prolungata/Cheyne-Stokes)\n  Vocalizzazione (0=nessuna, 1=lamenti/parole di dolore, 2=grida/pianto)\n  Espressione facciale (0=sorridente/neutrale, 1=triste/spaventata, 2=smorfie)\n  Linguaggio del corpo (0=rilassato, 1=teso/allerta, 2=rigido/pugni stretti)\n  Consolabilit\xE0 (0=non necessaria, 1=distraibile con voce/tocco, 2=non consolabile)"], notes: "Il dolore cronico nell'anziano si manifesta spesso come agitazione, rifiuto del cibo, isolamento o insonnia \u2014 non sempre come dolore riferito." },
  mna: { title: "MNA-SF \u2014 Mini Nutritional Assessment Short Form", purpose: "Screening nutrizionale validato per l'anziano in 6 item. Identifica malnutrizione e rischio nutrizionale. La malnutrizione \xE8 associata a prognosi peggiore, aumento delle complicazioni e ritardo nella guarigione.", time: "3\u20135 minuti", developed: "Vellas & Guigoz 1994; Rubenstein 2001 (SF)", scoring: "\u226512: Stato nutrizionale normale\n8\u201311: A rischio di malnutrizione\n\u22647: Malnutrizione", admin: ["A: Riduzione dell'assunzione di cibo negli ultimi 3 mesi (perdita appetito, problemi digestivi, masticazione, deglutizione)", "B: Perdita di peso recente \u2014 se pi\xF9 di 3kg=0, non sa=1, 1-3kg=2, nessuna perdita=3", "C: Mobilit\xE0 \u2014 allettato/sedia=0, si alza ma non esce=1, esce=2", "D: Stress psicologico o malattia acuta negli ultimi 3 mesi \u2014 s\xEC=0, no=2", "E: Problemi neuropsicologici \u2014 demenza/depressione grave=0, lieve=1, nessuno=2", "F1: BMI \u2014 <19=0, 19-21=1, 21-23=2, \u226523=3   OPPURE   F2: Circonferenza del polpaccio \u2014 <31cm=0, \u226531cm=3"] },
  social_net: { title: "Valutazione della Rete Sociale", purpose: "Esplora la situazione abitativa, la rete di supporto informale/formale, le risorse economiche e le barriere ambientali. Fondamentale per pianificare la dimissione e valutare il rischio di isolamento.", time: "5\u20138 minuti", admin: ["Raccogliere informazioni da paziente, familiari e/o assistente sociale", "Con chi vive il paziente? Chi \xE8 il caregiver primario? Qual \xE8 la sua disponibilit\xE0?", "Accessibilit\xE0 domiciliare: scale, barriere architettoniche, ascensore, bagno adattato?", "Risorse economiche: pensione sufficiente? Accesso a servizi domiciliari?", "Frequenza dei contatti sociali: rischio di solitudine e isolamento sociale?"] },
  zarit: { title: "Zarit Caregiver Burden Interview (ZBI-12)", purpose: "Misura il carico soggettivo del caregiver in 5 domini: salute, benessere psicologico, finanze, vita sociale, relazione con il paziente. Identifica i caregiver a rischio di burnout.", time: "8\u201310 minuti", developed: "Zarit et al., 1980; B\xE9dard 2001 (versione 12 item)", scoring: "0\u201320: Nessun carico\n21\u201340: Carico lieve-moderato\n41\u201360: Carico moderato-severo\n>60: Carico severo \u2014 supporto psicologico urgente", admin: ["Somministrare al CAREGIVER, non al paziente", "Riferirsi alle ultime settimane", "Scala di risposta: mai=0, raramente=1, qualche volta=2, spesso=3, quasi sempre=4"], notes: "Un carico elevato del caregiver \xE8 fattore di rischio per abbandono, maltrattamento del paziente e peggioramento della salute del caregiver stesso." },
  sleep: { title: "Valutazione della Qualit\xE0 del Sonno", purpose: "Screening per disturbi del sonno nell'anziano: insonnia, sonnolenza diurna, disturbi circadiani. I disturbi del sonno aumentano il rischio di cadute, decadimento cognitivo e depressione.", time: "3\u20135 minuti", admin: ["Difficolt\xE0 ad addormentarsi? Risvegli notturni? Risveglio mattutino precoce?", "Sonnolenza diurna eccessiva: interferisce con le attivit\xE0?", "Russamento notturno o apnee osservate dal partner/familiari?", "Movimenti involontari delle gambe (sindrome delle gambe senza riposo)?", "Uso di farmaci ipnotici: da quanto tempo? Ancora efficaci? Effetti collaterali?"], notes: "Benzodiazepine e Z-drugs sono nei Criteri di Beers: aumentano il rischio di cadute, confusione e dipendenza nell'anziano. Preferire terapia cognitivo-comportamentale, melatonina a basse dosi, igiene del sonno." },
  continence: { title: "Valutazione della Continenza", purpose: "Incontinenza urinaria e fecale colpisce il 30\u201350% degli anziani ospedalizzati. Spesso non dichiarata spontaneamente. Riduce qualit\xE0 di vita, aumenta rischio di lesioni da pressione e istituzionalizzazione.", time: "3\u20135 minuti", admin: ["Chiedere DIRETTAMENTE: 'Perde urina involontariamente?' \u2014 molti pazienti non lo riferiscono senza domanda esplicita", "Caratterizzare il tipo: urgenza (imperiosit\xE0), sforzo (tosse/starnuto/sforzo), overflow (ritenzione-prostata), funzionale (mobilit\xE0 ridotta)", "Valutare impatto sulle AVQ e sulla qualit\xE0 di vita", "Escludere cause reversibili: UTI, farmaci (diuretici, anticolinergici, alfa-litici), mobilit\xE0 ridotta (DIAPPERS mnemonic)"], notes: "Cause reversibili di incontinenza (DIAPPERS): Delirium, Infection, Atrophic urethritis, Pharmacological, Psychologic, Excessive output, Restricted mobility, Stool impaction." },
  dysphagia: { title: "EAT-10 \u2014 Screening Disfagia", purpose: "Questionario di screening per la disfagia (10 item). Punteggio \u22653 suggerisce disfagia e richiede valutazione logopedica. La disfagia \xE8 frequentemente sottodiagnosticata nell'anziano.", time: "3\u20135 minuti", developed: "Belafsky et al., 2008", scoring: "0\u20132: Nella norma\n\u22653: Possibile disfagia \u2014 inviare alla valutazione logopedica\nOgni item: 0=nessun problema, 4=problema grave", admin: ["Somministrare al paziente o al caregiver se il paziente non \xE8 in grado", "Fare riferimento alle ultime 4 settimane", "Se punteggio \u22653: approfondire con test clinico di deglutizione (GUSS, SSA) e/o videofluoroscopia"], notes: "La disfagia nell'anziano \xE8 associata a polmonite ab ingestis (causa di mortalit\xE0), malnutrizione e disidratazione. In caso di sospetto: dieta modificata texture C-D in attesa di valutazione formale." },
  handgrip: { title: "Handgrip Strength \u2014 Forza di Presa", purpose: "Indicatore di sarcopenia e fragilit\xE0 muscolare. La forza di presa \xE8 fortemente correlata con la forza muscolare globale, la qualit\xE0 di vita, le cadute e la mortalit\xE0. \xC8 il primo step diagnostico per la sarcopenia (EWGSOP2).", time: "3\u20135 minuti", developed: "EWGSOP2 \u2014 Cruz-Jentoft et al., 2019", scoring: "Cutoff EWGSOP2:\nUomini: < 27 kg = ridotta forza di presa\nDonne: < 16 kg = ridotta forza di presa\n\nIl valore va poi contestualizzato sulla curva percentile per et\xE0 e sesso (vedi grafico GeriScope).", admin: ["Utilizzare dinamometro calibrato (es. Jamar, standard di riferimento)", "Paziente seduto: gomito a 90\xB0, avambraccio neutro, polso tra 0\xB0 e 30\xB0 di estensione", "Mano dominante come riferimento principale", "3 prove per ciascuna mano, con 60 secondi di riposo tra le prove", "Registrare il VALORE MIGLIORE delle 3 prove", "Incoraggiare il massimo sforzo: 'Stringere pi\xF9 forte possibile!'", "Annotare: mano dominante, eventuale dolore articolare, uso di tutori"], notes: "La sarcopenia (EWGSOP2) richiede: bassa forza + bassa massa muscolare (DEXA, BIA o ecografia muscolare). La handgrip \xE8 il criterio primario. Se bassa forza + bassa massa + bassa performance fisica = sarcopenia grave." },
  braden: { title: "Scala di Braden \u2014 Rischio LdP", purpose: "Valuta il rischio di sviluppare lesioni da pressione (LdP). Score 6\u201323: pi\xF9 basso = rischio pi\xF9 alto. Guida le misure preventive e l'intensit\xE0 del piano di nursing.", time: "5\u20138 minuti", developed: "Braden & Bergstrom, 1987", scoring: "19\u201323: Rischio basso\n15\u201318: Rischio lieve\n13\u201314: Rischio moderato\n10\u201312: Rischio alto\n6\u20139: Rischio molto alto \u2192 presidi antidecubito e turning immediati", admin: ["PERCEZIONE SENSORIALE: risponde al dolore? Comunica il disagio?", "UMIDITA': cute esposta a sudore, urine, feci?", "ATTIVITA': a letto, in sedia, cammina poco, cammina frequentemente", "MOBILITA': capacit\xE0 di cambiare posizione autonomamente", "NUTRIZIONE: digiuno? Dieta liquida? Met\xE0 del pasto? Pasto completo?", "FRIZIONE/SCIVOLAMENTO: viene trascinato nelle lenzuola? Si muove in modo indipendente?"], notes: "Score \u226412 \u2192 protocollo intensivo: materasso antidecubito, cambio postura ogni 2h, protezione prominenze ossee (talloni, sacro, trocantere), idratazione cutanea, ottimizzazione nutrizionale." },
  brass: {
    title: "BRASS \u2014 Blaylock Discharge Risk Assessment",
    purpose: "Identifica i pazienti ad alto rischio di dimissione complessa. Consente la pianificazione precoce del percorso post-ospedaliero: assistenza domiciliare, trasferimento in struttura, supporto al caregiver. Validato in ambito ospedaliero geriatrico.",
    time: "8\u201310 minuti",
    developed: "Blaylock & Cason, 1992",
    scoring: "0\u201310: Rischio basso \u2014 dimissione standard\n11\u201319: Rischio moderato \u2014 pianificazione strutturata, valutare supporto domiciliare\n\u226520: Rischio alto \u2014 dimissione complessa, attivare assistente sociale",
    admin: ["Somministrare all'ingresso o nelle prime 48h di ricovero", "Aggiornare il punteggio se cambiano le condizioni cliniche o sociali", "Score \u226520: attivare precocemente il team multiprofessionale per la pianificazione della dimissione"],
    notes: "Il BRASS misura la COMPLESSITA' della dimissione, non la prognosi di mortalit\xE0. Un punteggio alto richiede lavoro multiprofessionale strutturato."

  mpi: {

    time: "5 minuti (dopo VMG completa)",
    developed: "Pilotto et al., 2008",
    scoring: "MPI 0.00\u20130.33: MPI-1 \u2014 Rischio basso (mortalit\xE0 a 1 mese <15%)\nMPI 0.34\u20130.66: MPI-2 \u2014 Rischio moderato (mortalit\xE0 a 1 mese 15\u201335%)\nMPI 0.67\u20131.00: MPI-3 \u2014 Rischio alto (mortalit\xE0 a 1 mese >35%)",
    admin: ["Completare le scale VMG di base: ADL, IADL, MMSE, MNA, Barthel, BRASS", "Per ogni dominio il sistema calcola automaticamente il grado 0/0.5/1", "Inserire manualmente il grado per rete sociale e comorbidit\xE0/farmaci", "L'MPI si calcola come media aritmetica degli 8 gradi"],
    notes: "L'MPI \xE8 uno strumento PROGNOSTICO, non terapeutico. Va comunicato con cautela. Non va usato come unico criterio per decisioni di cure intensive o palliative \u2014 sempre integrato con il giudizio clinico globale."
  },
  cfs: { title: "Clinical Frailty Scale (CFS)", purpose: "Misura globale della fragilit\xE0 basata sul giudizio clinico. Valuta la riserva funzionale da 1 (vigoroso) a 9 (terminale). Predice mortalit\xE0, ricoveri, disabilit\xE0 e risposta alle cure intensive.", time: "2\u20133 minuti", developed: "Rockwood et al., 2005; CSHA", scoring: "1\u20132: Robusta (non fragile)\n3: Gestione della malattia\n4: Vulnerabile\n5\u20136: Fragile (lieve\u2013moderata)\n7\u20138: Gravemente fragile\n9: Terminale", admin: ["Valutare lo stato PREMORBOSO (le 2 settimane prima dell'evento acuto che ha portato al ricovero)", "Non usare il CFS nella fase acuta come misura definitiva", "Integrare: capacit\xE0 funzionale, comorbilit\xE0, stato cognitivo e riserva fisiologica", "CFS \u2265 5 in paziente candidato a cure intensive: discutere con il paziente e i familiari"], notes: "CFS \u2265 5 durante il COVID-19 si \xE8 correlato ad alta mortalit\xE0 in TI. Va sempre integrato con il contesto clinico individuale \u2014 non come unico criterio di esclusione dalle cure intensive." }
